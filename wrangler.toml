name = "communique"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "nodejs_als"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[vars]
PUBLIC_SCROLL_RPC_URL = "https://rpc.scroll.io"
# IDENTITY_SIGNING_KEY = "set in Cloudflare dashboard (openssl rand -hex 32)"

# Contract addresses (override for mainnet deployment):
# PUBLIC_DEBATE_MARKET_ADDRESS = "0x..."
# PUBLIC_DISTRICT_GATE_ADDRESS = "0x..."
# PUBLIC_SCROLL_CHAIN_ID = "534352"

# Secrets (set via `npx wrangler pages secret put <KEY> --project-name communique-site`):
#
# Write Relay (Phase B1):
#   WRITE_RELAY_URL          - Write relay Worker URL (e.g., https://communique-write-relay.workers.dev)
#   WRITE_RELAY_TOKEN        - Bearer token for the write relay
#
# CWC Congressional Delivery:
#   CWC_API_KEY              - Senate CWC API key (soapbox.senate.gov)
#   CWC_PRODUCTION           - Set to "true" for live Senate delivery (default: testing endpoint)
#   GCP_PROXY_URL            - House CWC proxy base URL (e.g., https://35.209.173.125)
#   GCP_PROXY_AUTH_TOKEN     - Bearer token for the GCP proxy
#
# Identity & Security:
#   IDENTITY_SIGNING_KEY     - Ed25519 signing key for district credentials
#   JWT_SECRET               - Session token signing
#   IDENTITY_HASH_SALT       - Sybil-resistant identity hashing
#
# AI Services:
#   GEMINI_API_KEY           - Gemini API for agents + embeddings
#   GROQ_API_KEY             - Llama Guard safety moderation
#
# Rate Limiting:
#   REDIS_URL                - Redis connection URL for distributed rate limiting (optional)
#
# Wallet — Fiat Onramp:
#   PUBLIC_TRANSAK_API_KEY   - Transak API key for fiat onramp widget

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "870ed0ebca654838bc0df0d83c4e2645"
localConnectionString = "postgresql://communique:communique@localhost:5432/communique"

# DC_SESSION_KV: KV namespace for DC (district-confirmed) session state
# Used to store ephemeral session data during the congressional contact flow
# Create the namespace before deploying:
#   npx wrangler kv namespace create DC_SESSION_KV
# Then replace the id below with the output namespace ID
[[kv_namespaces]]
binding = "DC_SESSION_KV"
id = "a76f18d2c07042bc856a30038af05ab8"

# REJECTION_MONITOR_KV: KV namespace for rejection rate monitoring (P1 #18)
# Tracks hourly rejection counts per route group. Entries have 2hr TTL.
# Create the namespace before deploying:
#   npx wrangler kv namespace create REJECTION_MONITOR_KV
# Then replace the id below with the output namespace ID
[[kv_namespaces]]
binding = "REJECTION_MONITOR_KV"
id = "7e394f2a84174949b5b51c534c3a4976"

# VICAL_KV: KV namespace for AAMVA VICAL certificate cache
# Stores raw VICAL CBOR bytes with 7-day TTL for runtime IACA root extraction.
# Create the namespace before deploying:
#   npx wrangler kv namespace create VICAL_KV
# Then replace the id below with the output namespace ID
[[kv_namespaces]]
binding = "VICAL_KV"
id = "c59a1c7ec019425095b848a054f0b252"

# REGISTRATION_RETRY_KV: KV namespace for Shadow Atlas registration retry queue
# Stores atlas responses when Postgres write fails after successful tree mutation.
# Entries have 1hr TTL — processed by /api/admin/reconcile-registrations endpoint.
# Create the namespace before deploying:
#   npx wrangler kv namespace create REGISTRATION_RETRY_KV
# Then replace the id below with the output namespace ID
[[kv_namespaces]]
binding = "REGISTRATION_RETRY_KV"
id = "90772b3f79d945d5b5f0df3d6d2ca732"

# Reacher — self-hosted SMTP email verification service
# https://github.com/reacherhq/backend
#
# Deploy:
#   cd infra/reacher
#   fly launch --copy-config --no-deploy
#   fly secrets set RCH__HEADER_SECRET="<generate-a-secret>"
#   fly deploy
#
# Then on CF Workers side:
#   wrangler secret put REACHER_URL    # https://commons-reacher.fly.dev
#   wrangler secret put REACHER_API_KEY # same value as RCH__HEADER_SECRET

app = "commons-reacher"
primary_region = "iad"

[build]
  image = "reacherhq/backend:latest"

[env]
  # Rate limiting — prevent abuse / IP reputation damage
  RCH__THROTTLE__MAX_REQUESTS_PER_SECOND = "5"
  RCH__THROTTLE__MAX_REQUESTS_PER_MINUTE = "50"
  # SMTP probe timeouts
  RCH__SMTP_TIMEOUT = "15"
  # Bind to Fly's internal port
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# No HTTP health check — Reacher has no GET endpoint (POST-only API).
# Fly auto-start/stop works on incoming request traffic.

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
